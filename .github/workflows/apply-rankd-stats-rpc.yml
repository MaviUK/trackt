name: Restore focused Rankd ranking

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Restore focused ranking
        run: |
          python3 <<'PY'
          from pathlib import Path

          p = Path('src/pages/Rankd.jsx')
          s = p.read_text()

          marker = 'function moveShowToRank(shows, showId, targetRank) {'
          helpers = '''function isFocusSettled(items, focus) {
            if (!focus) return false;
            const sorted = [...items].sort(sortByLadder);
            const index = sorted.findIndex((show) => String(show.show_id) === String(focus.showId));
            if (index === -1) return false;
            const above = sorted[index - 1];
            const below = sorted[index + 1];
            const lostToAbove = !above || (focus.lostToIds || []).includes(String(above.show_id));
            const beatBelow = !below || (focus.beatenIds || []).includes(String(below.show_id));
            return lostToAbove && beatBelow;
          }

          function getFocusedPair(items, focusShowId, focus = null) {
            const sorted = [...items].sort(sortByLadder);
            const index = sorted.findIndex((show) => String(show.show_id) === String(focusShowId));
            if (index === -1) return [];
            const focused = sorted[index];
            const tested = new Set((focus?.testedIds || []).map(String));
            const offsets = [-1, 1, -2, 2, -4, 4, -3, 3, -6, 6, -5, 5, -8, 8, -10, 10];
            let opponent = null;
            for (const offset of offsets) {
              const candidate = sorted[index + offset];
              if (candidate && String(candidate.show_id) !== String(focusShowId) && !tested.has(String(candidate.show_id))) {
                opponent = candidate;
                break;
              }
            }
            if (!opponent) {
              opponent = sorted.find((show) => String(show.show_id) !== String(focusShowId) && !tested.has(String(show.show_id)));
            }
            if (!opponent) return [];
            return Math.random() > 0.5 ? [focused, opponent] : [opponent, focused];
          }

          '''
          if 'function isFocusSettled(' not in s:
            s = s.replace(marker, helpers + marker, 1)

          state = '  const [currentPair, setCurrentPair] = useState([]);\n'
          if 'const [rankFocus, setRankFocus]' not in s:
            s = s.replace(state, state + '  const [rankFocus, setRankFocus] = useState(null);\n', 1)

          old_start = '''  function startFocusedRanking(show) {
            setNotice(`${show.show_name || "This show"} focused ranking is being reconnected.`);
            window.scrollTo({ top: 0, behavior: "smooth" });
          }'''
          new_start = '''  function startFocusedRanking(show) {
            if (!isLoggedIn) {
              setShowLoginModal(true);
              return;
            }
            const focus = {
              showId: show.show_id,
              showName: show.show_name,
              testedIds: [],
              beatenIds: [],
              lostToIds: [],
            };
            const pair = getFocusedPair(eligibleShows, show.show_id, focus);
            if (pair.length !== 2) {
              setNotice("There are no other untested shows available for this title.");
              return;
            }
            setRankFocus(focus);
            setCurrentPair(pair);
            setNotice(`Ranking ${show.show_name}. Keep choosing the show you prefer until its position is confirmed.`);
            window.scrollTo({ top: 0, behavior: "smooth" });
          }'''
          if old_start not in s:
            raise SystemExit('Focused ranking placeholder was not found')
          s = s.replace(old_start, new_start, 1)

          old_pair = '''    const previousPairKey = currentPairKey;
            const nextPair = chooseFastPair(
              updatedLadder,
              previousPairKey,
              recentShowIdsRef.current,
              [previousPairKey, ...recentPairKeysRef.current]
            );'''
          new_pair = '''    const previousPairKey = currentPairKey;
            let nextFocus = rankFocus;
            let nextPair = [];

            if (rankFocus?.showId) {
              const focusWon = String(winner.show_id) === String(rankFocus.showId);
              const opponent = focusWon ? loser : winner;
              nextFocus = {
                ...rankFocus,
                testedIds: [...new Set([...(rankFocus.testedIds || []), String(opponent.show_id)])],
                beatenIds: focusWon
                  ? [...new Set([...(rankFocus.beatenIds || []), String(opponent.show_id)])]
                  : rankFocus.beatenIds || [],
                lostToIds: !focusWon
                  ? [...new Set([...(rankFocus.lostToIds || []), String(opponent.show_id)])]
                  : rankFocus.lostToIds || [],
              };

              if (isFocusSettled(updatedLadder, nextFocus)) {
                nextFocus = null;
                setRankFocus(null);
                setNotice(`${rankFocus.showName || "This show"} is now in its confirmed position.`);
              } else {
                nextPair = getFocusedPair(updatedLadder, nextFocus.showId, nextFocus);
                if (nextPair.length === 2) {
                  setRankFocus(nextFocus);
                } else {
                  nextFocus = null;
                  setRankFocus(null);
                  setNotice(`${rankFocus.showName || "This show"} has no more untested opponents.`);
                }
              }
            }

            if (!nextFocus) {
              nextPair = chooseFastPair(
                updatedLadder,
                previousPairKey,
                recentShowIdsRef.current,
                [previousPairKey, ...recentPairKeysRef.current]
              );
            }'''
          if old_pair not in s:
            raise SystemExit('Normal next-pair block was not found')
          s = s.replace(old_pair, new_pair, 1)

          p.write_text(s)
          PY
      - name: Build
        run: |
          npm ci
          npm run build
      - name: Commit restoration
        run: |
          rm .github/workflows/apply-rankd-stats-rpc.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/pages/Rankd.jsx .github/workflows/apply-rankd-stats-rpc.yml
          git commit -m "Restore focused Rankd ranking"
          git push
