name: Improve focused Rankd jumps

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  improve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply jump ranking
        run: python3 scripts/improve-rankd-focus-jumps.py
      - name: Install and build
        run: |
          npm install
          npm run build
      - name: Commit improvement
        run: |
          rm scripts/improve-rankd-focus-jumps.py
          rm .github/workflows/improve-rankd-focus-jumps.yml
          git config user.name "github-actions[bot]"
          git config user